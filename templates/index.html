{% extends "base.html" %}{% block content %}<section class="card"><h1>Projekte</h1>{% if projects %}<section class="grid pinned-projects">{% for p in projects %}<div class="project"><a href="/projects/{{p.id}}"><strong>{{p.name}}</strong><small>Erstellt: {{p.created_at|dt}}</small></a><a class="mini" href="/projects/{{p.id}}/export">Projekt herunterladen</a></div>{% endfor %}</section>{% else %}<p>Noch keine Projekte vorhanden.</p>{% endif %}<form method="post" action="/projects" class="row new-project-row"><input name="name" placeholder="Neues Projekt benennen *" required><button>+ Neues Projekt</button></form></section><section class="card"><h2>Projekt hochladen</h2><form method="post" action="/projects/import" enctype="multipart/form-data" class="row"><input type="file" name="file" accept=".zip" required><button>Projekt-ZIP hochladen</button></form></section><footer class="creator-footer">erstellt durch Oliver Decker</footer>{% endblock %}
