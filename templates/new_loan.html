{% extends "base.html" %}{% block content %}<section class="card"><h1>Neue Ausgabe</h1><p>Projekt: {{project.name}}</p><form method="post" action="/projects/{{project.id}}/loans" onsubmit="return validateLoanForm(this)"><label>Name *<input name="name" required></label><label>Datum *<input type="date" name="date" value="{{today}}" required></label><label>Funkgerät Seriennummer *<input name="radio_no" required></label><label>Batterie Seriennummer *<input name="battery_no" required></label><h3>Zubehör</h3>{% for a in accessories %}<label class="check"><input type="checkbox" name="accessories" value="{{a}}" {% if a == 'Spare Batterie' %}class="extra-battery-check"{% endif %}> {{a}}</label>{% if a == 'Spare Batterie' %}<label class="subfield">Spare Batterie Seriennummer *<input name="extra_battery_no" class="extra-battery-no"></label>{% endif %}{% endfor %}<label>Weiteres Zubehör<input name="custom_accessory" placeholder="Weiteres Zubehör eintragen"></label><h3>Unterschrift</h3><canvas id="sig" width="700" height="180"></canvas><input type="hidden" name="signature_data" id="signature_data"><div class="actions"><button>Speichern</button><a class="btn secondary" href="/projects/{{project.id}}">Abbrechen</a><button type="button" class="secondary" onclick="clearSig()">Unterschrift löschen</button></div></form></section>{% endblock %}
