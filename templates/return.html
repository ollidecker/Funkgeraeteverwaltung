{% extends "base.html" %}{% block content %}<section class="card"><h1>Rückgabe</h1><p>{{project.name}} - {{loan.sequence_no}} · {{loan.name}}</p><form method="post" action="/loans/{{loan.id}}/return"><h3>Zurückgegeben</h3>{% for item in items %}<label class="check"><input type="checkbox" name="returned_items" value="{{item}}" {% if item in returned %}checked{% endif %}> {{item}}</label>{% endfor %}<label>Bemerkung<textarea name="return_note" rows="4">{{loan.return_note or ''}}</textarea></label><div class="actions"><button>Rückgabe speichern</button><a class="btn secondary" href="/loans/{{loan.id}}">Abbrechen</a></div></form></section>{% endblock %}
